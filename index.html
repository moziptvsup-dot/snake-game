<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Neon Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.8s ease;
    }
    h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00ff88, #00d4ff, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
      letter-spacing: 4px;
    }
    canvas {
      border: 3px solid #00ff88;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.4),
                  0 0 60px rgba(0, 212, 255, 0.2),
                  inset 0 0 20px rgba(0, 255, 136, 0.1);
      background: rgba(15, 15, 26, 0.95);
    }
    .score-board {
      margin-top: 15px;
      padding: 15px 40px;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 212, 255, 0.2));
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
    }
    .score {
      font-size: 1.5rem;
      font-weight: bold;
      color: #00ff88;
    }
    .instructions {
      margin-top: 10px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }
    button {
      margin-top: 25px;
      padding: 12px 40px;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #00ff88, #00d4ff);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      color: #0f0c29;
      box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
      transition: all 0.3s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 255, 136, 0.6);
    }
    button:active {
      transform: translateY(1px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 NEON SNAKE</h1>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="score-board">
      <div class="score">Score: <span id="score">0</span></div>
    </div>
    <div class="instructions">Use Arrow Keys or WASD to move</div>
    <button onclick="resetGame()">🎮 Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 0;
    let dy = -1;
    let score = 0;
    let gameLoop;
    let isRunning = false;

    function draw() {
      // Draw grid
      ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw snake with glow
      snake.forEach((part, i) => {
        const isHead = i === 0;
        const gradient = ctx.createRadialGradient(
          part.x * gridSize + gridSize / 2,
          part.y * gridSize + gridSize / 2,
          0,
          part.x * gridSize + gridSize / 2,
          part.y * gridSize + gridSize / 2,
          gridSize
        );

        if (isHead) {
          gradient.addColorStop(0, '#ffffff');
          gradient.addColorStop(0.3, '#00ff88');
          gradient.addColorStop(1, 'rgba(0, 255, 136, 0)');
        } else {
          gradient.addColorStop(0, '#4dff99');
          gradient.addColorStop(1, 'rgba(0, 255, 136, 0)');
        }

        ctx.fillStyle = gradient;
        ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);

        // Draw eyes on head
        if (isHead) {
          ctx.fillStyle = '#0f0c29';
          const eyeSize = 3;
          ctx.beginPath();
          ctx.arc(part.x * gridSize + 6, part.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
          ctx.arc(part.x * gridSize + 14, part.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Draw food with glow
      const foodGradient = ctx.createRadialGradient(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        0,
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize
      );
      foodGradient.addColorStop(0, '#ff6b6b');
      foodGradient.addColorStop(0.5, '#ff4757');
      foodGradient.addColorStop(1, 'rgba(255, 71, 87, 0)');

      ctx.fillStyle = foodGradient;
      ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

      // Draw food sparkle
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(food.x * gridSize + 7, food.y * gridSize + 7, 4, 4);
    }

    function update() {
      if (dx === 0 && dy === 0) return;

      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      // Wall collision
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
        return;
      }

      // Self collision
      if (snake.some(part => part.x === head.x && part.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };
      // Avoid placing on snake
      if (snake.some(part => part.x === food.x && part.y === food.y)) {
        placeFood();
      }
    }

    function gameOver() {
      clearInterval(gameLoop);
      isRunning = false;

      ctx.fillStyle = 'rgba(15, 12, 41, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 32px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 15);

      ctx.fillStyle = '#00ff88';
      ctx.font = '20px Segoe UI';
      ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
    }

    function resetGame() {
      clearInterval(gameLoop);
      snake = [{x: 10, y: 10}];
      dx = 0;
      dy = -1;
      score = 0;
      scoreEl.textContent = '0';
      placeFood();
      draw();
      isRunning = true;
      gameLoop = setInterval(update, 100);
    }

    document.addEventListener('keydown', (e) => {
      if (!isRunning && (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')) {
        resetGame();
        return;
      }
      switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (dy !== 1) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (dy !== -1) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (dx !== 1) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (dx !== -1) { dx = 1; dy = 0; }
          break;
      }
    });

    // Auto-start the game
    resetGame();
  </script>
</body>
</html>
